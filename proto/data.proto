// Data Service Protocol Buffer definitions.
//
// Book: "Designing AI Systems" (https://www.manning.com/books/designing-ai-systems)
//   Listing 5.24: Data service gRPC contract

syntax = "proto3";

package data;

// Listing 5.24
service DataService {
    // Index management
    rpc CreateIndex(CreateIndexRequest) returns (IndexResponse);
    rpc GetIndex(GetIndexRequest) returns (IndexResponse);
    rpc ListIndexes(ListIndexesRequest) returns (ListIndexesResponse);
    rpc DeleteIndex(DeleteIndexRequest) returns (DeleteIndexResponse);

    // Document ingestion
    rpc IngestDocument(IngestDocumentRequest) returns (IngestJobResponse);
    rpc GetIngestJob(GetIngestJobRequest) returns (IngestJobResponse);

    // Document management
    rpc ListDocuments(ListDocumentsRequest) returns (ListDocumentsResponse);
    rpc GetDocument(GetDocumentRequest) returns (DocumentMetadataResponse);
    rpc DeleteDocument(DeleteDocumentRequest) returns (DeleteDocumentResponse);

    // Search
    rpc Search(SearchRequest) returns (SearchResponse);
    rpc HybridSearch(HybridSearchRequest) returns (SearchResponse);

    // Dynamic code loading for custom parsers and chunking strategies
    rpc RegisterParser(RegisterParserRequest) returns (RegisterParserResponse);
    rpc RegisterChunkingStrategy(RegisterChunkingStrategyRequest) returns (RegisterChunkingStrategyResponse);
}

// ---------- Index types ----------

message IndexConfig {
    string name = 1;
    string embedding_model = 2;
    int32 embedding_dimensions = 3;
    string chunking_strategy = 4;
    int32 chunk_size = 5;
    int32 chunk_overlap = 6;
    map<string, string> metadata_schema = 7;
}

message IndexResponse {
    string name = 1;
    IndexConfig config = 2;
    string owner = 3;
    int32 document_count = 4;
    int32 total_chunks = 5;
    string created_at = 6;
    string last_ingested_at = 7;
}

message CreateIndexRequest {
    IndexConfig config = 1;
    string owner = 2;
}

message GetIndexRequest {
    string index_name = 1;
}

message ListIndexesRequest {}

message ListIndexesResponse {
    repeated IndexResponse indexes = 1;
}

message DeleteIndexRequest {
    string index_name = 1;
}

message DeleteIndexResponse {
    bool success = 1;
    int32 chunks_deleted = 2;
}

// ---------- Ingestion types ----------

message IngestDocumentRequest {
    string index_name = 1;
    string filename = 2;
    bytes content = 3;
    string content_type = 4;
    map<string, string> metadata = 5;
    string document_id = 6;
}

message IngestJobResponse {
    string job_id = 1;
    string status = 2;
    string document_id = 3;
    float progress = 4;
    string error = 5;
}

message GetIngestJobRequest {
    string job_id = 1;
}

// ---------- Document management types ----------

message ListDocumentsRequest {
    string index_name = 1;
}

message DocumentMetadataResponse {
    string document_id = 1;
    string index_name = 2;
    string filename = 3;
    int32 chunk_count = 4;
    int32 page_count = 5;
    int32 word_count = 6;
    map<string, string> custom_metadata = 7;
    string ingested_at = 8;
}

message ListDocumentsResponse {
    repeated DocumentMetadataResponse documents = 1;
}

message GetDocumentRequest {
    string index_name = 1;
    string document_id = 2;
}

message DeleteDocumentRequest {
    string index_name = 1;
    string document_id = 2;
}

message DeleteDocumentResponse {
    bool success = 1;
    int32 chunks_deleted = 2;
}

// ---------- Search types ----------

message SearchRequest {
    string index_name = 1;
    string query = 2;
    int32 top_k = 3;
    map<string, string> metadata_filters = 4;
    float score_threshold = 5;
}

message HybridSearchRequest {
    string index_name = 1;
    string query = 2;
    int32 top_k = 3;
    map<string, string> metadata_filters = 4;
    float score_threshold = 5;
}

message SearchResultItem {
    string chunk_id = 1;
    string document_id = 2;
    string text = 3;
    float score = 4;
    map<string, string> metadata = 5;
}

message SearchResponse {
    repeated SearchResultItem results = 1;
}

// ---------- Dynamic code loading types ----------

message RegisterParserRequest {
    string format = 1;
    string class_name = 2;
    string version = 3;
    bytes source_code = 4;
}

message RegisterParserResponse {
    bool success = 1;
    string message = 2;
}

message RegisterChunkingStrategyRequest {
    string name = 1;
    string class_name = 2;
    string version = 3;
    bytes source_code = 4;
}

message RegisterChunkingStrategyResponse {
    bool success = 1;
    string message = 2;
}
